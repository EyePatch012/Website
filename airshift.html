<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Airshift | Ray</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&display=swap"
          rel="stylesheet" />
</head>
<body class="project-page">
    <div class="page-transition" aria-hidden="true">
        <div class="transition-core">
            <span class="transition-ring"></span>
            <span class="transition-ring delay"></span>
            <p>Loading dossier...</p>
        </div>
    </div>

    <header class="page-header reveal">
        <h1 class="top-right" id="typewriter" data-text="Airshift">Airshift</h1>
        <nav aria-label="Project navigation">
            <ul class="breadcrumb-nav">
                <li><a href="projects.html">← Back to Projects</a></li>
            </ul>
        </nav>
    </header>

    <div class="background-scatter" aria-hidden="true"></div>

    <main class="main-content">
        <article class="project-detail reveal">
            <div class="cover-wrapper">
                <img src="Project Icons/NeoPulse.png" alt="Airshift" class="project-cover" />
            </div>

            <div class="project-copy">
                <p>
                    Airshift is a third-person shooter PvP project set in a stylized environment with fast, movement-based gameplay.
                </p>

                <ul class="project-highlights">
                    <li>Details and media links coming soon.</li>
                </ul>

                <div class="project-cta">
                    <a class="ghost-btn" href="projects.html">Return to Projects</a>
                </div>
            </div>
        </article>

        <section class="project-video reveal">
            <h2>Airshift YouTube Video</h2>
            <div class="video-wrapper">
                <iframe width="560" height="315" src="https://www.youtube.com/embed/3lpnXtrVUWU" title="Airshift video preview" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        </section>
    </main>

    <footer class="footer-glow">
        <div class="footer-container">
            <div class="footer-contact">
                <p>Want to collaborate on Airshift?</p>
                <a class="primary-btn" href="mailto:eyepatch012@gmail.com">Email Me</a>
            </div>
        </div>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
